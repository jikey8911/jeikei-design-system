<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeiKei Neural Design System - Explorer</title>
    <link rel="stylesheet" href="../styles/neural-theme.css">
    <link rel="stylesheet" href="../neural-grid/neural-grid.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap');

        body {
            background-color: #05070a;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .neural-btn {
            background: transparent;
            border: 1px solid rgba(0, 255, 156, 0.3);
            color: #00ff9c;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: inline-block;
            text-align: center;
        }

        .neural-btn:hover {
            background: rgba(0, 255, 156, 0.1);
            border-color: #00ff9c;
            box-shadow: 0 0 20px rgba(0, 255, 156, 0.3);
            transform: translateY(-2px);
        }

        .neural-btn.primary {
            background: #00ff9c;
            color: #05070a;
            border: none;
        }

        .neural-btn.primary:hover {
            background: #00e58c;
            box-shadow: 0 0 30px rgba(0, 255, 156, 0.6);
        }

        .glass-card {
            background: rgba(11, 15, 20, 0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 156, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(0, 255, 156, 0.5);
        }
    </style>
</head>
<body class="overflow-hidden h-screen flex items-center justify-center">

    <div class="neural-grid fixed inset-0"></div>

    <div class="relative z-10 max-w-4xl w-full px-8">
        <div class="glass-card text-center space-y-12">
            <header class="space-y-4">
                <div class="inline-block p-3 rounded-2xl bg-[#00ff9c1a] border border-[#00ff9c33] mb-6">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00ff9c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <h1 class="text-7xl font-black uppercase tracking-tighter glow-text leading-tight">
                    JeiKei <span class="text-[#00ff9c]">Neural</span> <br> Design System
                </h1>
                <p class="text-[rgba(0,255,156,0.6)] font-mono text-sm tracking-[0.4em] uppercase">
                    System Manifest // Core Explorer v2.1
                </p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-8">
                <a href="./gallery/ComponentsGallery.tsx" class="neural-btn primary py-6 text-xl">
                    componentsGallery
                </a>
                <a href="./dashboard/MissionDashboard.tsx" class="neural-btn py-6 text-xl">
                    dashboard
                </a>
            </div>

            <footer class="pt-10">
                <p class="text-xs text-white/30 font-mono tracking-widest uppercase">
                    FUTURISTIC // NEURAL // NEON // ACCESS_LEVEL_5
                </p>
            </footer>
        </div>
    </div>

    <script type="module">
        import {startNeuralActivity} from "../neural-grid/neural-grid.js"
        startNeuralActivity()
    </script>
</body>
</html>
